name: corereusablepackage
description: Reusable UI components, theme, services and base classes shared across apps.
version: 0.1.0
publish_to: 'none'

environment:
  sdk: ^3.13.0-134.0.dev
  flutter: ">=3.10.0"

dependencies:
  flutter:
    sdk: flutter
  flutter_bloc: ^9.1.0
  equatable: ^2.0.7
  go_router: ^14.6.2
  shared_preferences: ^2.3.3

dev_dependencies:
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true
